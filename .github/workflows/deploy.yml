name: Deploy to GitHub Pages

# main에 push될 때마다 빌드 후 GitHub Pages로 배포.
on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 허용

# Pages 배포에 필요한 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포 (진행 중 실행은 취소하지 않고 큐잉).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # package.json의 packageManager 버전을 사용

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
